<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cyber Runner | دونده سایبری</title>
    
    <!-- فونت وزیر -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Vazir', sans-serif;
            background: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .game-wrapper {
            background: linear-gradient(145deg, #111122, #0a0a12);
            border-radius: 32px;
            padding: 12px;
            box-shadow: 0 0 60px rgba(0, 150, 255, 0.08), inset 0 0 60px rgba(0, 100, 255, 0.03);
        }

        .game-container {
            position: relative;
            width: 420px;
            height: 720px;
            background: radial-gradient(ellipse at 50% 20%, #141430, #08080f);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: inset 0 0 100px rgba(0, 50, 150, 0.15);
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        /* ===== رابط کاربری ===== */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 8px 16px 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(0, 200, 255, 0.12);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
            pointer-events: auto;
        }

        .score-section {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #00d4ff;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.3);
        }

        .score-section svg {
            width: 28px;
            height: 28px;
            filter: drop-shadow(0 0 10px rgba(0, 200, 255, 0.5));
        }

        .best-section {
            color: #8899bb;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .best-section span {
            color: #ffd866;
            font-weight: 700;
        }

        /* ===== کنترل‌های لمسی ===== */
        .touch-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            z-index: 15;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
        }

        .touch-btn {
            pointer-events: auto;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(0, 200, 255, 0.08);
            border: 1.5px solid rgba(0, 200, 255, 0.15);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: rgba(0, 200, 255, 0.6);
            transition: 0.15s;
            box-shadow: 0 0 30px rgba(0, 200, 255, 0.05);
        }

        .touch-btn:active {
            transform: scale(0.88);
            background: rgba(0, 200, 255, 0.2);
            border-color: rgba(0, 200, 255, 0.4);
        }

        .touch-left {
            display: flex;
            gap: 12px;
        }
        .touch-right {
            display: flex;
            gap: 12px;
        }

        .touch-btn svg {
            width: 28px;
            height: 28px;
            filter: drop-shadow(0 0 8px rgba(0, 200, 255, 0.2));
        }

        /* ===== مودال ===== */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(14px);
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            pointer-events: auto;
            transition: opacity 0.5s ease;
        }

        .modal-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .modal-icon {
            margin-bottom: 10px;
        }

        .modal-icon svg {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 0 40px rgba(0, 200, 255, 0.4));
        }

        .modal-title {
            font-size: 2.8rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 40px rgba(0, 180, 255, 0.3);
            margin-bottom: 6px;
            letter-spacing: 2px;
        }

        .modal-sub {
            color: #8899cc;
            font-size: 1.1rem;
            margin-bottom: 24px;
            opacity: 0.8;
        }

        .modal-score {
            color: #ffd866;
            font-size: 2.6rem;
            font-weight: 900;
            margin: 4px 0;
            text-shadow: 0 0 30px rgba(255, 216, 102, 0.2);
        }

        .modal-best {
            color: #8899bb;
            font-size: 1.1rem;
            margin-bottom: 28px;
        }

        .btn {
            font-family: 'Vazir', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            padding: 16px 48px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #00c8ff, #0066ff);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 40px rgba(0, 150, 255, 0.35);
            transition: 0.2s ease;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 50px rgba(0, 150, 255, 0.5);
        }

        .btn:active {
            transform: scale(0.94);
        }

        .btn svg {
            width: 26px;
            height: 26px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: none;
            font-size: 1rem;
            padding: 10px 28px;
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            box-shadow: none;
        }

        /* ===== Combo نمایش ===== */
        .combo-display {
            position: absolute;
            top: 80px;
            right: 20px;
            z-index: 12;
            color: #ffd866;
            font-size: 1.6rem;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(255, 216, 102, 0.3);
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }

        .combo-display.show {
            opacity: 1;
        }

        /* ===== واکنش‌گرا ===== */
        @media (max-width: 450px) {
            .game-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
            .game-wrapper {
                border-radius: 0;
                padding: 0;
                width: 100%;
            }
            .modal-title {
                font-size: 2rem;
            }
            .btn {
                font-size: 1.1rem;
                padding: 14px 32px;
            }
            .touch-btn {
                width: 54px;
                height: 54px;
                font-size: 22px;
            }
            .touch-btn svg {
                width: 22px;
                height: 22px;
            }
        }

        @media (min-width: 451px) {
            .touch-controls {
                display: none !important;
            }
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="game-container" id="gameContainer">

        <!-- بوم اصلی -->
        <canvas id="gameCanvas"></canvas>

        <!-- ===== UI ===== -->
        <div class="ui-overlay">
            <div class="header">
                <div class="score-section">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#00d4ff"/>
                                <stop offset="50%" stop-color="#0088ff"/>
                                <stop offset="100%" stop-color="#0044cc"/>
                            </linearGradient>
                        </defs>
                        <path d="M12 2L2 12L12 22L22 12L12 2Z" fill="url(#diamondGrad)" stroke="#00d4ff" stroke-width="1.2" opacity="0.9"/>
                        <path d="M12 6L6 12L12 18L18 12L12 6Z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
                        <circle cx="12" cy="12" r="2" fill="rgba(255,255,255,0.3)"/>
                    </svg>
                    <span id="scoreDisplay">۰</span>
                </div>
                <div class="best-section">
                    🏆 <span id="bestDisplay">۰</span>
                </div>
            </div>
            <div style="flex:1;"></div>
        </div>

        <!-- کامبو -->
        <div class="combo-display" id="comboDisplay">🔥 x<span id="comboCount">0</span></div>

        <!-- ===== کنترل‌های لمسی ===== -->
        <div class="touch-controls" id="touchControls">
            <div class="touch-left">
                <button class="touch-btn" id="btnLeft" aria-label="چپ">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <button class="touch-btn" id="btnRight" aria-label="راست">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
            <div class="touch-right">
                <button class="touch-btn" id="btnJump" aria-label="پرش">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                </button>
                <button class="touch-btn" id="btnSlide" aria-label="سر خوردن">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 20h16M8 16l-4-4 4-4M16 16l4-4-4-4"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- ===== مودال ===== -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal-icon">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="robotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00d4ff"/>
                            <stop offset="100%" stop-color="#0066cc"/>
                        </linearGradient>
                        <linearGradient id="visorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#00ff88"/>
                            <stop offset="100%" stop-color="#00ccff"/>
                        </linearGradient>
                    </defs>
                    <!-- بدنه -->
                    <rect x="25" y="30" width="50" height="45" rx="12" fill="url(#robotGrad)" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>
                    <!-- سر -->
                    <rect x="32" y="10" width="36" height="28" rx="10" fill="#1a1a3a" stroke="#00d4ff" stroke-width="1.5"/>
                    <!-- visor -->
                    <rect x="38" y="16" width="24" height="12" rx="6" fill="url(#visorGrad)" opacity="0.8" stroke="#00ff88" stroke-width="0.8"/>
                    <circle cx="44" cy="22" r="2" fill="#fff" opacity="0.6"/>
                    <circle cx="56" cy="22" r="2" fill="#fff" opacity="0.6"/>
                    <!-- آنتن -->
                    <line x1="50" y1="10" x2="50" y2="2" stroke="#00d4ff" stroke-width="2"/>
                    <circle cx="50" cy="0" r="3" fill="#ff4466" stroke="#ff4466" stroke-width="1">
                        <animate attributeName="opacity" values="1;0.2;1" dur="0.8s" repeatCount="indefinite"/>
                    </circle>
                    <!-- جت‌پک -->
                    <ellipse cx="35" cy="72" rx="10" ry="6" fill="#004488" stroke="#00d4ff" stroke-width="0.8"/>
                    <ellipse cx="65" cy="72" rx="10" ry="6" fill="#004488" stroke="#00d4ff" stroke-width="0.8"/>
                    <!-- شعله جت -->
                    <ellipse cx="35" cy="82" rx="6" ry="10" fill="#ff6633" opacity="0.6">
                        <animate attributeName="ry" values="8;14;8" dur="0.3s" repeatCount="indefinite"/>
                    </ellipse>
                    <ellipse cx="65" cy="82" rx="6" ry="10" fill="#ff6633" opacity="0.6">
                        <animate attributeName="ry" values="8;14;8" dur="0.3s" repeatCount="indefinite"/>
                    </ellipse>
                    <!-- پاها -->
                    <rect x="28" y="72" width="14" height="8" rx="3" fill="#003366" stroke="#00d4ff" stroke-width="0.8"/>
                    <rect x="58" y="72" width="14" height="8" rx="3" fill="#003366" stroke="#00d4ff" stroke-width="0.8"/>
                    <!-- چراغ‌های نئون -->
                    <circle cx="28" cy="45" r="3" fill="#00ff88" opacity="0.7">
                        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.2s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="72" cy="45" r="3" fill="#00ff88" opacity="0.7">
                        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.2s" repeatCount="indefinite"/>
                    </circle>
                </svg>
            </div>
            <div class="modal-title">سایبر رانر</div>
            <div class="modal-sub" id="modalSub">آماده‌ای برای دویدن؟</div>
            <div class="modal-score" id="modalScore" style="display:none;"></div>
            <div class="modal-best" id="modalBest"></div>
            <button class="btn" id="mainBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5,3 19,12 5,21"/>
                </svg>
                شروع
            </button>
            <button class="btn btn-secondary" id="resetBtn" style="display:none;">↻ بازی جدید</button>
        </div>

    </div>
</div>

<script>
    (function() {
        'use strict';

        // ============================================
        //  تنظیمات
        // ============================================
        const CONFIG = {
            width: 420,
            height: 720,
            laneCount: 3,
            laneWidth: 110,
            playerWidth: 36,
            playerHeight: 48,
            gravity: 0.6,
            jumpPower: -12,
            slideDuration: 25,
            obstacleSpawnRate: 28,
            baseSpeed: 5,
            maxSpeed: 12,
            coinChance: 0.25,
            powerupChance: 0.06,
        };

        // ============================================
        //  DOM
        // ============================================
        const container = document.getElementById('gameContainer');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const scoreDisplay = document.getElementById('scoreDisplay');
        const bestDisplay = document.getElementById('bestDisplay');
        const comboDisplay = document.getElementById('comboDisplay');
        const comboCount = document.getElementById('comboCount');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalSub = document.getElementById('modalSub');
        const modalScore = document.getElementById('modalScore');
        const modalBest = document.getElementById('modalBest');
        const mainBtn = document.getElementById('mainBtn');
        const resetBtn = document.getElementById('resetBtn');

        // دکمه‌های لمسی
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const btnJump = document.getElementById('btnJump');
        const btnSlide = document.getElementById('btnSlide');

        // ============================================
        //  سایز بوم
        // ============================================
        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            const w = rect.width || CONFIG.width;
            const h = rect.height || CONFIG.height;
            canvas.width = w;
            canvas.height = h;
            CONFIG.width = w;
            CONFIG.height = h;
            CONFIG.laneWidth = w / 3;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ============================================
        //  کلاس بازیکن
        // ============================================
        class Player {
            constructor() {
                this.w = CONFIG.playerWidth;
                this.h = CONFIG.playerHeight;
                this.x = CONFIG.width / 2 - this.w / 2;
                this.y = CONFIG.height - 160 - this.h;
                this.lane = 1; // 0,1,2
                this.targetX = this.x;
                this.vy = 0;
                this.isGrounded = true;
                this.isSliding = false;
                this.slideTimer = 0;
                this.jumpCount = 0;
                this.maxJumps = 2;
                this.invincible = false;
                this.invincibleTimer = 0;
            }

            get centerX() { return this.x + this.w / 2; }
            get centerY() { return this.y + this.h / 2; }

            setLane(lane) {
                this.lane = Math.max(0, Math.min(2, lane));
                const laneWidth = CONFIG.laneWidth;
                const offset = (CONFIG.width - laneWidth * 3) / 2;
                this.targetX = offset + this.lane * laneWidth + (laneWidth - this.w) / 2;
            }

            update() {
                // حرکت نرم به سمت لاین
                this.x += (this.targetX - this.x) * 0.15;
                if (Math.abs(this.x - this.targetX) < 0.5) this.x = this.targetX;

                // فیزیک پرش
                if (!this.isGrounded) {
                    this.vy += CONFIG.gravity;
                    this.y += this.vy;
                }

                // برخورد با زمین
                const groundY = CONFIG.height - 160 - this.h;
                if (this.y >= groundY) {
                    this.y = groundY;
                    this.vy = 0;
                    this.isGrounded = true;
                    this.jumpCount = 0;
                } else {
                    this.isGrounded = false;
                }

                // سر خوردن
                if (this.isSliding) {
                    this.slideTimer--;
                    if (this.slideTimer <= 0) {
                        this.isSliding = false;
                        this.h = CONFIG.playerHeight;
                        this.y = CONFIG.height - 160 - this.h;
                    }
                }

                // جاودانگی
                if (this.invincible) {
                    this.invincibleTimer--;
                    if (this.invincibleTimer <= 0) {
                        this.invincible = false;
                    }
                }

                // محدودیت
                this.x = Math.max(0, Math.min(CONFIG.width - this.w, this.x));
            }

            jump() {
                if (this.jumpCount < this.maxJumps) {
                    if (!this.isGrounded) {
                        // پرش دوم
                        this.vy = CONFIG.jumpPower * 0.85;
                    } else {
                        this.vy = CONFIG.jumpPower;
                        this.isGrounded = false;
                    }
                    this.jumpCount++;
                    // پرش افکت
                    createParticles(this.centerX, this.y + this.h, '#00d4ff', 8, 2);
                }
            }

            slide() {
                if (this.isGrounded && !this.isSliding) {
                    this.isSliding = true;
                    this.slideTimer = CONFIG.slideDuration;
                    this.h = CONFIG.playerHeight * 0.55;
                    this.y = CONFIG.height - 160 - this.h;
                    createParticles(this.centerX, this.y + this.h, '#00ff88', 6, 1.5);
                }
            }

            getBounds() {
                return {
                    x: this.x + 6,
                    y: this.y + 4,
                    w: this.w - 12,
                    h: this.h - 8
                };
            }

            draw(ctx) {
                const cx = this.centerX;
                const cy = this.centerY;
                const w = this.w;
                const h = this.h;

                // افکت جاودانگی
                if (this.invincible) {
                    ctx.shadowColor = '#00d4ff';
                    ctx.shadowBlur = 50;
                    ctx.strokeStyle = 'rgba(0, 212, 255, 0.3)';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(this.x - 4, this.y - 4, w + 8, h + 8);
                    ctx.shadowBlur = 0;
                }

                // سایه
                ctx.shadowColor = 'rgba(0, 200, 255, 0.15)';
                ctx.shadowBlur = 30;

                // بدنه ربات
                const grad = ctx.createLinearGradient(this.x, this.y, this.x + w, this.y + h);
                grad.addColorStop(0, '#1a3a6a');
                grad.addColorStop(0.5, '#0a2a4a');
                grad.addColorStop(1, '#0a1a3a');
                ctx.fillStyle = grad;
                ctx.shadowBlur = 25;
                ctx.shadowColor = 'rgba(0, 150, 255, 0.2)';
                ctx.beginPath();
                ctx.roundRect(this.x, this.y + (this.isSliding ? 12 : 0), w, h - (this.isSliding ? 12 : 0), 8);
                ctx.fill();

                // بدنه بیرونی (نئون)
                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth = 1.5;
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(0, 200, 255, 0.3)';
                ctx.strokeRect(this.x + 2, this.y + 2 + (this.isSliding ? 12 : 0), w - 4, h - 4 - (this.isSliding ? 12 : 0));

                // visor
                const visorY = this.isSliding ? 8 : 10;
                ctx.shadowBlur = 30;
                ctx.shadowColor = 'rgba(0, 255, 200, 0.4)';
                const visorGrad = ctx.createLinearGradient(this.x, this.y + visorY, this.x, this.y + visorY + 12);
                visorGrad.addColorStop(0, '#00ff88');
                visorGrad.addColorStop(1, '#00ccff');
                ctx.fillStyle = visorGrad;
                ctx.beginPath();
                ctx.roundRect(this.x + 6, this.y + visorY, w - 12, 12, 4);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 0.8;
                ctx.strokeRect(this.x + 6, this.y + visorY, w - 12, 12);

                // چشم‌ها
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.beginPath();
                ctx.arc(this.x + 8, this.y + visorY + 6, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x + w - 8, this.y + visorY + 6, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(this.x + 7, this.y + visorY + 5, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x + w - 9, this.y + visorY + 5, 1.5, 0, Math.PI * 2);
                ctx.fill();

                // جت‌پک (وقتی در حال پرش)
                if (!this.isGrounded) {
                    ctx.shadowBlur = 40;
                    ctx.shadowColor = 'rgba(255, 100, 50, 0.5)';
                    for (let i = 0; i < 2; i++) {
                        const jx = this.x + 6 + i * (w - 12);
                        const jy = this.y + h - 2;
                        ctx.fillStyle = `rgba(255, 100, 50, ${0.3 + Math.random() * 0.3})`;
                        ctx.beginPath();
                        ctx.ellipse(jx, jy + 8, 6, 12 + Math.random() * 8, 0, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // چراغ‌های نئون (روی شانه)
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(255, 50, 100, 0.5)';
                ctx.fillStyle = '#ff4466';
                ctx.beginPath();
                ctx.arc(this.x + 4, this.y + 8 + (this.isSliding ? 12 : 0), 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#44ff88';
                ctx.shadowColor = 'rgba(0, 255, 100, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x + w - 4, this.y + 8 + (this.isSliding ? 12 : 0), 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 0;
            }
        }

        // ============================================
        //  آیتم‌ها
        // ============================================
        class Obstacle {
            constructor(type, lane) {
                this.type = type; // 'mine', 'laser', 'wall'
                this.lane = lane;
                const laneWidth = CONFIG.laneWidth;
                const offset = (CONFIG.width - laneWidth * 3) / 2;
                this.x = offset + lane * laneWidth + laneWidth / 2;
                this.y = -60;
                this.width = 40;
                this.height = 40;
                this.speed = CONFIG.baseSpeed + Math.random() * 1.5;
                this.passed = false;

                if (type === 'laser') {
                    this.width = 50;
                    this.height = 12;
                } else if (type === 'wall') {
                    this.width = 60;
                    this.height = 50;
                } else {
                    this.width = 32;
                    this.height = 32;
                }
            }

            update(speedMultiplier) {
                this.y += this.speed * speedMultiplier;
            }

            isOffScreen() {
                return this.y > CONFIG.height + 50;
            }

            getBounds() {
                const w = this.type === 'laser' ? this.width : this.width * 0.7;
                const h = this.type === 'laser' ? this.height : this.height * 0.7;
                return {
                    x: this.x - w / 2,
                    y: this.y - h / 2,
                    w: w,
                    h: h
                };
            }

            draw(ctx) {
                const cx = this.x;
                const cy = this.y;

                if (this.type === 'mine') {
                    // مین زمینی
                    ctx.shadowColor = 'rgba(255, 50, 50, 0.6)';
                    ctx.shadowBlur = 30;
                    const grad = ctx.createRadialGradient(cx - 3, cy - 3, 2, cx, cy, this.width / 2);
                    grad.addColorStop(0, '#ff4444');
                    grad.addColorStop(0.6, '#cc2222');
                    grad.addColorStop(1, '#881111');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(cx, cy, this.width / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#ff6666';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // جزئیات مین
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.beginPath();
                    ctx.arc(cx - 6, cy - 4, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(cx + 6, cy - 4, 4, 0, Math.PI * 2);
                    ctx.fill();

                    // چراغ چشمک‌زن
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = 'rgba(255, 0, 0, 0.8)';
                    ctx.fillStyle = Math.random() > 0.5 ? '#ff0000' : '#ff3333';
                    ctx.beginPath();
                    ctx.arc(cx, cy + 2, 4, 0, Math.PI * 2);
                    ctx.fill();

                } else if (this.type === 'laser') {
                    // لیزر
                    ctx.shadowBlur = 40;
                    ctx.shadowColor = 'rgba(255, 50, 50, 0.8)';
                    const grad = ctx.createLinearGradient(cx - this.width / 2, cy, cx + this.width / 2, cy);
                    grad.addColorStop(0, 'rgba(255,0,0,0)');
                    grad.addColorStop(0.2, 'rgba(255,50,50,0.9)');
                    grad.addColorStop(0.5, 'rgba(255,100,100,1)');
                    grad.addColorStop(0.8, 'rgba(255,50,50,0.9)');
                    grad.addColorStop(1, 'rgba(255,0,0,0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.roundRect(cx - this.width / 2, cy - this.height / 2, this.width, this.height, 4);
                    ctx.fill();

                    // نور مرکزی
                    ctx.shadowBlur = 60;
                    ctx.shadowColor = 'rgba(255, 0, 0, 0.6)';
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.beginPath();
                    ctx.roundRect(cx - this.width / 4, cy - this.height / 3, this.width / 2, this.height * 0.66, 2);
                    ctx.fill();

                } else if (this.type === 'wall') {
                    // دیوار متحرک
                    ctx.shadowColor = 'rgba(0, 200, 255, 0.3)';
                    ctx.shadowBlur = 30;
                    const grad = ctx.createLinearGradient(cx - this.width / 2, cy - this.height / 2, cx + this.width / 2, cy + this.height / 2);
                    grad.addColorStop(0, '#1a3a6a');
                    grad.addColorStop(0.5, '#2a5a8a');
                    grad.addColorStop(1, '#0a2a4a');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.roundRect(cx - this.width / 2, cy - this.height / 2, this.width, this.height, 6);
                    ctx.fill();

                    ctx.strokeStyle = '#00d4ff';
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = 'rgba(0, 200, 255, 0.4)';
                    ctx.strokeRect(cx - this.width / 2 + 4, cy - this.height / 2 + 4, this.width - 8, this.height - 8);

                    // خطوط نئون روی دیوار
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = 'rgba(0, 200, 255, 0.15)';
                    ctx.lineWidth = 1;
                    for (let i = 0; i < 3; i++) {
                        const yy = cy - this.height / 2 + 10 + i * 12;
                        ctx.beginPath();
                        ctx.moveTo(cx - this.width / 2 + 12, yy);
                        ctx.lineTo(cx + this.width / 2 - 12, yy);
                        ctx.stroke();
                    }
                }

                ctx.shadowBlur = 0;
            }
        }

        // ============================================
        //  آیتم‌های مثبت
        // ============================================
        class Coin {
            constructor(lane) {
                this.lane = lane;
                const laneWidth = CONFIG.laneWidth;
                const offset = (CONFIG.width - laneWidth * 3) / 2;
                this.x = offset + lane * laneWidth + laneWidth / 2;
                this.y = -40;
                this.size = 18;
                this.speed = CONFIG.baseSpeed + Math.random() * 0.8;
                this.collected = false;
                this.rotation = 0;
            }

            update(speedMultiplier) {
                this.y += this.speed * speedMultiplier;
                this.rotation += 0.04;
            }

            isOffScreen() {
                return this.y > CONFIG.height + 30;
            }

            getBounds() {
                const s = this.size * 0.7;
                return { x: this.x - s, y: this.y - s, w: s * 2, h: s * 2 };
            }

            draw(ctx) {
                const cx = this.x;
                const cy = this.y;
                const s = this.size;

                // الماس سه‌بعدی
                ctx.shadowColor = 'rgba(0, 212, 255, 0.6)';
                ctx.shadowBlur = 35;

                const grad = ctx.createLinearGradient(cx - s, cy - s, cx + s, cy + s);
                grad.addColorStop(0, '#00d4ff');
                grad.addColorStop(0.4, '#00ff88');
                grad.addColorStop(0.7, '#0088ff');
                grad.addColorStop(1, '#0044cc');
                ctx.fillStyle = grad;

                ctx.beginPath();
                ctx.moveTo(cx, cy - s);
                ctx.lineTo(cx + s * 0.7, cy);
                ctx.lineTo(cx, cy + s);
                ctx.lineTo(cx - s * 0.7, cy);
                ctx.closePath();
                ctx.fill();

                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // براقیت
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.beginPath();
                ctx.moveTo(cx - 3, cy - s * 0.5);
                ctx.lineTo(cx + 3, cy - s * 0.5);
                ctx.lineTo(cx + 2, cy);
                ctx.lineTo(cx - 2, cy);
                ctx.closePath();
                ctx.fill();

                // نور مرکزی
                ctx.shadowBlur = 40;
                ctx.shadowColor = 'rgba(0, 212, 255, 0.4)';
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.beginPath();
                ctx.arc(cx, cy - 2, s * 0.3, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 0;
            }
        }

        // ============================================
        //  سیستم ذرات
        // ============================================
        let particles = [];

        function createParticles(x, y, color, count = 12, speed = 3) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const spd = Math.random() * speed + 0.5;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * spd,
                    vy: Math.sin(angle) * spd - 0.5,
                    life: 1,
                    decay: 0.015 + Math.random() * 0.025,
                    size: Math.random() * 5 + 2,
                    color: color,
                });
            }
        }

        function updateParticles() {
            for (const p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.04;
                p.life -= p.decay;
                p.size *= 0.995;
            }
            particles = particles.filter(p => p.life > 0.05);
        }

        function drawParticles(ctx) {
            for (const p of particles) {
                ctx.globalAlpha = p.life;
                ctx.shadowBlur = 25;
                ctx.shadowColor = p.color;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        // ============================================
        //  کلاس اصلی بازی
        // ============================================
        class Game {
            constructor() {
                this.player = new Player();
                this.obstacles = [];
                this.coins = [];
                this.score = 0;
                this.best = parseInt(localStorage.getItem('cyberRunnerBest')) || 0;
                this.gameOver = false;
                this.started = false;
                this.frameCount = 0;
                this.speedMultiplier = 1;
                this.combo = 0;
                this.comboTimer = 0;
                this.distance = 0;

                this.keys = { left: false, right: false, jump: false, slide: false };

                this.setupControls();
                this.updateBestDisplay();
                this.showStartScreen();
            }

            setupControls() {
                // ===== کیبورد =====
                document.addEventListener('keydown', (e) => {
                    if (this.gameOver || !this.started) {
                        if (e.key === ' ' || e.key === 'Enter') {
                            e.preventDefault();
                            this.startGame();
                        }
                        return;
                    }
                    switch (e.key) {
                        case 'ArrowLeft':
                        case 'a':
                            e.preventDefault();
                            this.player.setLane(this.player.lane - 1);
                            break;
                        case 'ArrowRight':
                        case 'd':
                            e.preventDefault();
                            this.player.setLane(this.player.lane + 1);
                            break;
                        case 'ArrowUp':
                        case ' ':
                            e.preventDefault();
                            this.player.jump();
                            break;
                        case 'ArrowDown':
                        case 's':
                            e.preventDefault();
                            this.player.slide();
                            break;
                    }
                });

                // ===== دکمه‌های لمسی =====
                btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); this.player.setLane(this.player.lane - 1); });
                btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); this.player.setLane(this.player.lane + 1); });
                btnJump.addEventListener('touchstart', (e) => { e.preventDefault(); this.player.jump(); });
                btnSlide.addEventListener('touchstart', (e) => { e.preventDefault(); this.player.slide(); });

                btnLeft.addEventListener('mousedown', () => this.player.setLane(this.player.lane - 1));
                btnRight.addEventListener('mousedown', () => this.player.setLane(this.player.lane + 1));
                btnJump.addEventListener('mousedown', () => this.player.jump());
                btnSlide.addEventListener('mousedown', () => this.player.slide());

                // ===== سوایپ لمسی =====
                let touchStartX = 0, touchStartY = 0;
                canvas.addEventListener('touchstart', (e) => {
                    const touch = e.touches[0];
                    touchStartX = touch.clientX;
                    touchStartY = touch.clientY;
                }, { passive: true });

                canvas.addEventListener('touchmove', (e) => {
                    if (this.gameOver || !this.started) return;
                    const touch = e.touches[0];
                    const dx = touch.clientX - touchStartX;
                    const dy = touch.clientY - touchStartY;
                    if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy) * 0.5) {
                        if (dx > 0) this.player.setLane(this.player.lane + 1);
                        else this.player.setLane(this.player.lane - 1);
                        touchStartX = touch.clientX;
                    } else if (Math.abs(dy) > 30 && Math.abs(dy) > Math.abs(dx) * 0.5) {
                        if (dy < 0) this.player.jump();
                        else this.player.slide();
                        touchStartY = touch.clientY;
                    }
                }, { passive: true });
            }

            startGame() {
                this.started = true;
                this.gameOver = false;
                this.score = 0;
                this.obstacles = [];
                this.coins = [];
                this.particles = [];
                this.frameCount = 0;
                this.speedMultiplier = 1;
                this.combo = 0;
                this.comboTimer = 0;
                this.distance = 0;
                this.player = new Player();
                this.player.setLane(1);
                this.updateScoreDisplay();
                modalOverlay.classList.add('hidden');
                comboDisplay.classList.remove('show');
                this.updateBestDisplay();
            }

            gameOverHandler() {
                this.gameOver = true;
                this.started = false;
                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('cyberRunnerBest', String(this.best));
                    this.updateBestDisplay();
                    modalSub.textContent = '🎯 رکورد جدید!';
                } else {
                    modalSub.textContent = '💫 بازی تمام شد!';
                }
                modalScore.style.display = 'block';
                modalScore.textContent = `امتیاز: ${this.score}`;
                modalBest.textContent = `🏆 بهترین: ${this.best}`;
                mainBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5,3 19,12 5,21"/>
                    </svg>
                    دوباره!
                `;
                resetBtn.style.display = 'none';
                modalOverlay.classList.remove('hidden');
                comboDisplay.classList.remove('show');
            }

            showStartScreen() {
                modalSub.textContent = 'آماده‌ای برای دویدن؟';
                modalScore.style.display = 'none';
                modalBest.textContent = `🏆 بهترین: ${this.best}`;
                mainBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5,3 19,12 5,21"/>
                    </svg>
                    شروع
                `;
                resetBtn.style.display = 'none';
                modalOverlay.classList.remove('hidden');
            }

            updateBestDisplay() {
                bestDisplay.textContent = this.best;
            }

            updateScoreDisplay() {
                scoreDisplay.textContent = Math.floor(this.score);
                if (this.combo > 1) {
                    comboDisplay.classList.add('show');
                    comboCount.textContent = this.combo;
                } else {
                    comboDisplay.classList.remove('show');
                }
            }

            spawnObstacle() {
                const types = ['mine', 'mine', 'mine', 'laser', 'wall'];
                const type = types[Math.floor(Math.random() * types.length)];
                const lane = Math.floor(Math.random() * 3);
                // جلوگیری از spawn در لاین بازیکن
                if (Math.random() < 0.3) {
                    // می‌تونه در لاین بازیکن بیاد (چالش)
                }
                this.obstacles.push(new Obstacle(type, lane));
            }

            spawnCoin() {
                const lane = Math.floor(Math.random() * 3);
                this.coins.push(new Coin(lane));
            }

            checkCollisions() {
                const playerBounds = this.player.getBounds();

                // برخورد با موانع
                for (const obs of this.obstacles) {
                    const obsBounds = obs.getBounds();
                    if (this.rectCollide(playerBounds, obsBounds)) {
                        if (this.player.invincible) {
                            createParticles(obs.x, obs.y, '#00d4ff', 15, 3);
                            this.obstacles = this.obstacles.filter(o => o !== obs);
                            continue;
                        }
                        createParticles(this.player.centerX, this.player.centerY, '#ff4444', 30, 4);
                        this.gameOverHandler();
                        return;
                    }
                }

                // برخورد با سکه‌ها
                for (const coin of this.coins) {
                    const coinBounds = coin.getBounds();
                    if (this.rectCollide(playerBounds, coinBounds) && !coin.collected) {
                        coin.collected = true;
                        this.combo++;
                        this.comboTimer = 60; // 60 فریم کامبو حفظ میشه
                        const bonus = this.combo > 1 ? this.combo : 1;
                        this.score += 10 * bonus;
                        createParticles(coin.x, coin.y, '#00d4ff', 16, 3);
                        this.updateScoreDisplay();
                        this.coins = this.coins.filter(c => c !== coin);
                    }
                }

                // کامبو تایمر
                if (this.comboTimer > 0) {
                    this.comboTimer--;
                    if (this.comboTimer === 0) {
                        this.combo = 0;
                        this.updateScoreDisplay();
                    }
                }
            }

            rectCollide(a, b) {
                return a.x < b.x + b.w &&
                       a.x + a.w > b.x &&
                       a.y < b.y + b.h &&
                       a.y + a.h > b.y;
            }

            update() {
                if (!this.started || this.gameOver) return;

                this.frameCount++;
                this.distance += 0.1;

                // افزایش سرعت
                this.speedMultiplier = 1 + Math.min(Math.floor(this.score / 50) * 0.12, 1.4);

                // اسپاون موانع
                const spawnRate = Math.max(18, CONFIG.obstacleSpawnRate - Math.floor(this.score / 15));
                if (this.frameCount % spawnRate === 0) {
                    this.spawnObstacle();
                    if (this.score > 30 && Math.random() < 0.25) {
                        this.spawnObstacle(); // دو تا با هم
                    }
                }

                // اسپاون سکه
                if (this.frameCount % 12 === 0 && Math.random() < CONFIG.coinChance) {
                    this.spawnCoin();
                }

                // بروزرسانی بازیکن
                this.player.update();

                // بروزرسانی موانع
                for (const obs of this.obstacles) {
                    obs.update(this.speedMultiplier);
                }
                this.obstacles = this.obstacles.filter(o => !o.isOffScreen());

                // بروزرسانی سکه‌ها
                for (const coin of this.coins) {
                    coin.update(this.speedMultiplier);
                }
                this.coins = this.coins.filter(c => !c.isOffScreen() && !c.collected);

                // برخوردها
                this.checkCollisions();

                // ذرات
                updateParticles();

                // افزایش امتیاز با زمان
                if (this.frameCount % 5 === 0) {
                    this.score += 0.2;
                    this.updateScoreDisplay();
                }

                // خط تولید پشت زمینه
                if (this.frameCount % 2 === 0) {
                    // افکت پشت زمینه
                }
            }

            draw() {
                ctx.clearRect(0, 0, CONFIG.width, CONFIG.height);

                // ===== خطوط جاده =====
                ctx.shadowBlur = 0;
                const laneWidth = CONFIG.laneWidth;
                const offset = (CONFIG.width - laneWidth * 3) / 2;

                // خطوط راهنما
                for (let i = 0; i < 4; i++) {
                    const x = offset + i * laneWidth;
                    ctx.strokeStyle = 'rgba(0, 200, 255, 0.06)';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([8, 16]);
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, CONFIG.height);
                    ctx.stroke();
                }
                ctx.setLineDash([]);

                // خطوط سرعت (پویا)
                ctx.strokeStyle = `rgba(0, 200, 255, ${0.03 + Math.sin(Date.now() * 0.001) * 0.01})`;
                ctx.lineWidth = 2;
                for (let i = 0; i < 6; i++) {
                    const yy = (this.distance * 20 + i * 120) % CONFIG.height;
                    ctx.beginPath();
                    ctx.moveTo(offset + 20, yy);
                    ctx.lineTo(offset + laneWidth * 3 - 20, yy);
                    ctx.stroke();
                }

                // ===== کشیدن سکه‌ها =====
                for (const coin of this.coins) {
                    coin.draw(ctx);
                }

                // ===== کشیدن موانع =====
                for (const obs of this.obstacles) {
                    obs.draw(ctx);
                }

                // ===== کشیدن ذرات =====
                drawParticles(ctx);

                // ===== کشیدن بازیکن =====
                this.player.draw(ctx);

                // ===== خط افق =====
                ctx.shadowBlur = 0;
                const grad = ctx.createLinearGradient(0, CONFIG.height - 180, 0, CONFIG.height - 140);
                grad.addColorStop(0, 'rgba(0, 0, 0, 0)');
                grad.addColorStop(1, 'rgba(0, 50, 100, 0.1)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, CONFIG.height - 180, CONFIG.width, 40);

                // خط نئون پایین
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(0, 200, 255, 0.1)';
                ctx.strokeStyle = 'rgba(0, 200, 255, 0.08)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, CONFIG.height - 155);
                ctx.lineTo(CONFIG.width, CONFIG.height - 155);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        // ============================================
        //  Polyfill roundRect
        // ============================================
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            };
        }

        // ============================================
        //  راه‌اندازی
        // ============================================
        const game = new Game();

        mainBtn.addEventListener('click', () => game.startGame());
        resetBtn.addEventListener('click', () => game.startGame());

        document.addEventListener('keydown', (e) => {
            if ((e.key === 'Enter' || e.key === ' ') && (game.gameOver || !game.started)) {
                e.preventDefault();
                game.startGame();
            }
        });

        game.loop();

        // ریسایز
        window.addEventListener('resize', () => {
            resizeCanvas();
            if (game.player) {
                game.player.setLane(game.player.lane);
            }
        });

        console.log('🔥 Cyber Runner - بازی دونده سایبری راه‌اندازی شد!');
        console.log('🎮 کنترل: ↑ پرش | ↓ سر خوردن | ←/→ تغییر لاین');
        console.log('📱 گوشی: سوایپ بالا/پایین/چپ/راست');
    })();
</script>
</body>
</html>
