<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>در حال بروزرسانی | mim.non.ir</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #292929;
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
            font-weight: 900 !important;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        body, body * {
            font-weight: 900 !important;
        }
        .update-box {
            background: #1f1f1f;
            padding: 40px 30px;
            border-radius: 48px;
            border: 2px solid #FFC800;
            max-width: 450px;
            width: 90%;
        }
        .update-box i {
            font-size: 4rem;
            color: #FFC800;
            margin-bottom: 20px;
            display: inline-block;
            animation: spin 2s infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0); }
            100% { transform: rotate(360deg); }
        }
        .update-box h1 {
            font-size: 1.8rem;
            color: #FFC800;
            margin-bottom: 15px;
        }
        .update-box p {
            font-size: 1rem;
            margin: 10px 0;
            color: #ccc;
        }
        .update-box small {
            display: block;
            margin-top: 25px;
            font-size: 0.7rem;
            color: #888;
        }
        .refresh-btn {
            background: #FFC800;
            color: #121212;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            margin-top: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .refresh-btn:hover {
            background: #e6b400;
        }
    </style>
</head>
<body>
    <div class="update-box">
        <i class="fas fa-sync-alt"></i>
        <h1>در حال بروزرسانی</h1>
        <p>⚠️ سایت میم نون چند لحظه‌ای است در دسترس نیست</p>
        <p>🔧 تیم فنی مشغول اعمال تغییرات و بهبود امکانات است</p>
        <p>📱 لطفاً چند دقیقه دیگر مجدد تلاش کنید</p>
        <button class="refresh-btn" onclick="location.reload()">
            <i class="fas fa-redo-alt"></i> تلاش مجدد
        </button>
        <small>mim.non.ir | همه چیز به زودی بهتر از قبل</small>
    </div>
    <script>
        setInterval(() => {
            location.reload();
        }, 10000);
    </script>
</body>
</html>
