<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>کارت محصول · قويت بيع</title>
  <style>
    /* reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a14;
      font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
    }

    /* کارت اصلی — گرادیان تیره + سایه نرم + گوشه‌های گرد */
    .product-card {
      max-width: 420px;
      width: 100%;
      background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2e 100%);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 8px 20px rgba(0, 0, 0, 0.5);
      padding: 2rem 1.75rem 1.75rem;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
      color: #f0f0f5;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 28px 48px rgba(0, 0, 0, 0.8), 0 10px 24px rgba(0, 0, 0, 0.6);
    }

    /* عنوان محصول */
    .product-title {
      font-size: 1.9rem;
      font-weight: 700;      /* bold */
      letter-spacing: 0.5px;
      color: #ffffff;
      margin-bottom: 0.35rem;
      line-height: 1.2;
    }

    /* قیمت با رنگ طلایی و وزن bold */
    .product-price {
      font-size: 2.2rem;
      font-weight: 700;      /* bold */
      color: #F5C518;        /* طلایی کلیدی */
      margin: 0.5rem 0 0.75rem;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    /* کاما به‌صورت پیش‌فرض در عدد وجود دارد، ولی برای زیبایی */
    .product-price span {
      font-weight: 700;
    }

    /* ویژگی‌ها: ۹ وزن + ۳ سبک */
    .product-features {
      font-size: 1.1rem;
      font-weight: 400;
      color: #cfcfdf;
      background: rgba(255, 255, 255, 0.04);
      padding: 0.6rem 1rem;
      border-radius: 40px;
      display: inline-block;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(245, 197, 24, 0.15);
      margin: 0.4rem 0 1.2rem;
    }

    .product-features strong {
      font-weight: 600;
      color: #e8e8f0;
    }

    /* آیتم‌های پایین: دو تگ (فونت نسخ / فونت متن) */
    .product-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.6rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding-top: 1.6rem;
    }

    .tag {
      background: rgba(245, 197, 24, 0.12);
      color: #F5C518;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      border: 1px solid rgba(245, 197, 24, 0.20);
      backdrop-filter: blur(2px);
      letter-spacing: 0.3px;
      transition: background 0.15s, border-color 0.15s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    .tag:first-child {
      background: rgba(245, 197, 24, 0.18);
      border-color: rgba(245, 197, 24, 0.35);
    }

    .tag:hover {
      background: rgba(245, 197, 24, 0.22);
      border-color: #F5C518;
    }

    /* خط جداکننده ظریف (اختیاری) */
    .tag-divider {
      display: none;
    }

    /* ریسپانسیو */
    @media (max-width: 480px) {
      .product-card {
        padding: 1.5rem 1.25rem;
      }
      .product-title {
        font-size: 1.6rem;
      }
      .product-price {
        font-size: 1.9rem;
      }
      .product-features {
        font-size: 1rem;
        padding: 0.4rem 0.9rem;
      }
      .tag {
        font-size: 0.85rem;
        padding: 0.4rem 1rem;
      }
    }

    /* جزئیات اضافی: نشان طلایی کوچک برای قیمت (اختیاری) */
    .price-symbol {
      font-weight: 300;
      margin-right: 2px;
      opacity: 0.9;
    }

    /* متن‌ها با درجه‌بندی وزن (bold برای قیمت و عنوان) */
    .product-title,
    .product-price {
      font-weight: 700;
    }

    /* بقیه متن‌ها معمولی یا ۵۰۰ */
    .product-features {
      font-weight: 400;
    }

    /* برای زیبایی بیشتر، یک افکت نور ملایم روی کارت */
    .product-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 10% 20%, rgba(245, 197, 24, 0.03), transparent 60%);
      pointer-events: none;
      border-radius: 24px;
    }

    .product-card {
      position: relative;
      overflow: hidden;
    }

    /* بهبود خوانایی */
    .product-sub {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    /* فاصله بین قیمت و ویژگی‌ها */
    .price-feature-group {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    /* تگ‌ها در پایین */
    .tag {
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="product-card">
    <!-- عنوان: قويت بيع (با وزن bold) -->
    <h2 class="product-title">قويت بيع</h2>

    <!-- قیمت با کاما + رنگ طلایی + bold -->
    <div class="product-price">
      <span>۷۹۸,۰۰۰</span>
      <span class="price-symbol">تومان</span>
    </div>

    <!-- ویژگی‌ها: ۹ وزن + ۳ سبك -->
    <div class="product-features">
      <strong>۹ وزن</strong> + ۳ سبك
    </div>

    <!-- آیتم‌های پایین: دو تگ جداگانه -->
    <div class="product-tags">
      <span class="tag">فونت نسخ</span>
      <span class="tag">فونت متن</span>
    </div>
  </div>
</body>
</html>
