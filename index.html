<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Falling Hero | سقوط آزاد</title>
    
    <!-- فونت وزیر -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Vazir', sans-serif;
            background: #0b0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* کانتینر اصلی */
        .game-wrapper {
            background: linear-gradient(145deg, #141a2b, #0b0e1a);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(90, 140, 255, 0.05);
        }

        .game-container {
            position: relative;
            width: 400px;
            height: 700px;
            background: radial-gradient(ellipse at 50% 30%, #1a2340, #070a12);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: inset 0 0 80px rgba(0, 20, 80, 0.6);
            touch-action: none;
            cursor: none;
        }

        /* ===== لایه ستاره‌های پس‌زمینه ===== */
        #stars-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== عناصر بازی ===== */
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
            touch-action: none;
        }

        /* ===== رابط کاربری ===== */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px 20px;
        }

        /* هدر امتیازات */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            padding: 10px 18px;
            border-radius: 60px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            pointer-events: auto;
        }

        .score-box {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ffe484;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        .score-box svg {
            width: 28px;
            height: 28px;
            filter: drop-shadow(0 0 8px #ffd966);
        }

        .best-box {
            color: #a0b4e0;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.06);
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .best-box span {
            color: #ffd966;
            font-weight: 700;
        }

        /* ===== صفحه شروع / پایان ===== */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            pointer-events: auto;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .modal-title {
            font-size: 3.2rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px rgba(100, 180, 255, 0.5);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-title svg {
            width: 56px;
            height: 56px;
            filter: drop-shadow(0 0 20px #4a8eff);
        }

        .modal-sub {
            color: #b0c8ff;
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .modal-score {
            color: #ffe484;
            font-size: 2.8rem;
            font-weight: 900;
            margin: 6px 0;
        }

        .modal-best {
            color: #aab8e0;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .btn {
            font-family: 'Vazir', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            padding: 16px 52px;
            border: none;
            border-radius: 80px;
            background: linear-gradient(135deg, #f7c948, #f0a500);
            color: #0b0e1a;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(240, 165, 0, 0.4);
            transition: 0.2s ease;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(240, 165, 0, 0.7);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: none;
            font-size: 1rem;
            padding: 10px 28px;
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .powerup-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            color: #ffe484;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: none;
            opacity: 0;
            transition: 0.3s;
        }

        .powerup-indicator.show {
            opacity: 1;
        }

        .powerup-indicator svg {
            width: 24px;
            height: 24px;
        }

        /* ===== واکنش‌گرا ===== */
        @media (max-width: 450px) {
            .game-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
            .game-wrapper {
                border-radius: 0;
                padding: 0;
                width: 100%;
            }
            .modal-title {
                font-size: 2.4rem;
            }
            .btn {
                font-size: 1.2rem;
                padding: 14px 36px;
            }
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="game-container" id="gameContainer">

        <!-- بوم ستاره‌های پس‌زمینه -->
        <canvas id="stars-canvas"></canvas>

        <!-- بوم اصلی بازی -->
        <canvas id="game-canvas"></canvas>

        <!-- ===== رابط کاربری ===== -->
        <div class="ui-overlay">
            <div class="header">
                <div class="score-box">
                    <!-- آیکون ستاره ساخته شده با SVG -->
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="#FFD966" stroke="#FFA500" stroke-width="1.2"/>
                    </svg>
                    <span id="scoreDisplay">۰</span>
                </div>
                <div class="best-box">
                    🏆 <span id="bestDisplay">۰</span>
                </div>
            </div>
            <div style="flex:1;"></div>
        </div>

        <!-- نشان‌دهنده پاورآپ فعال -->
        <div class="powerup-indicator" id="powerupIndicator">
            <span id="powerupIcon">🛡️</span>
            <span id="powerupText">سپر</span>
        </div>

        <!-- ===== مودال شروع / پایان ===== -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal-title">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="10" r="6" stroke="#FFD966" stroke-width="2"/>
                    <path d="M5 20L12 14L19 20" stroke="#FFD966" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="12" cy="4" r="1.5" fill="#FFD966" stroke="#FFA500" stroke-width="1"/>
                    <circle cx="7" cy="9" r="1" fill="#FFD966" stroke="#FFA500" stroke-width="1"/>
                    <circle cx="17" cy="9" r="1" fill="#FFD966" stroke="#FFA500" stroke-width="1"/>
                </svg>
                سقوط آزاد
            </div>
            <div class="modal-sub" id="modalSub">فضانورد، آماده‌ای؟</div>
            <div class="modal-score" id="modalScore" style="display:none;"></div>
            <div class="modal-best" id="modalBest"></div>
            <button class="btn" id="mainBtn">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 3L19 12L5 21V3Z" fill="white" stroke="white" stroke-width="1.5"/>
                </svg>
                شروع بازی
            </button>
            <button class="btn btn-secondary" id="resetBtn" style="display:none;">↺ بازی جدید</button>
        </div>

    </div>
</div>

<script>
    (function() {
        'use strict';

        // ---------- تنظیمات ----------
        const CONFIG = {
            width: 400,
            height: 700,
            playerSize: 38,
            meteorMinSize: 20,
            meteorMaxSize: 48,
            starSize: 22,
            powerupSize: 28,
            baseSpeed: 2.2,
            maxSpeed: 5.8,
            spawnInterval: 32,       // فریم
            starChance: 0.35,
            powerupChance: 0.08,
        };

        // ---------- DOM ----------
        const container = document.getElementById('gameContainer');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const starsCanvas = document.getElementById('stars-canvas');
        const starsCtx = starsCanvas.getContext('2d');

        const scoreDisplay = document.getElementById('scoreDisplay');
        const bestDisplay = document.getElementById('bestDisplay');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalSub = document.getElementById('modalSub');
        const modalScore = document.getElementById('modalScore');
        const modalBest = document.getElementById('modalBest');
        const mainBtn = document.getElementById('mainBtn');
        const resetBtn = document.getElementById('resetBtn');
        const powerupIndicator = document.getElementById('powerupIndicator');
        const powerupIcon = document.getElementById('powerupIcon');
        const powerupText = document.getElementById('powerupText');

        // ---------- سایز بوم ----------
        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            const w = rect.width || CONFIG.width;
            const h = rect.height || CONFIG.height;
            canvas.width = w;
            canvas.height = h;
            starsCanvas.width = w;
            starsCanvas.height = h;
            CONFIG.width = w;
            CONFIG.height = h;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ---------- ستاره‌های پس‌زمینه (پویا) ----------
        class StarField {
            constructor() {
                this.stars = [];
                this.count = 120;
                this.init();
            }
            init() {
                this.stars = [];
                for (let i = 0; i < this.count; i++) {
                    this.stars.push({
                        x: Math.random() * CONFIG.width,
                        y: Math.random() * CONFIG.height,
                        r: Math.random() * 1.8 + 0.5,
                        speed: Math.random() * 0.6 + 0.2,
                        alpha: Math.random() * 0.8 + 0.2,
                        twinkleSpeed: Math.random() * 0.02 + 0.01,
                    });
                }
            }
            update() {
                for (const s of this.stars) {
                    s.y += s.speed * 0.4;
                    s.alpha += Math.sin(Date.now() * s.twinkleSpeed) * 0.008;
                    s.alpha = Math.min(0.9, Math.max(0.15, s.alpha));
                    if (s.y > CONFIG.height) {
                        s.y = -2;
                        s.x = Math.random() * CONFIG.width;
                    }
                }
            }
            draw(ctx) {
                for (const s of this.stars) {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                    ctx.shadowColor = 'rgba(180, 220, 255, 0.3)';
                    ctx.shadowBlur = 12;
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }
        }

        const starField = new StarField();

        // ---------- کلاس‌های بازی ----------
        class Player {
            constructor() {
                this.size = CONFIG.playerSize;
                this.x = CONFIG.width / 2;
                this.y = CONFIG.height - 110;
                this.targetX = this.x;
                this.smoothX = this.x;
            }
            update() {
                this.smoothX += (this.targetX - this.smoothX) * 0.22;
                this.x = this.smoothX;
                // محدودیت
                this.x = Math.max(this.size / 2, Math.min(CONFIG.width - this.size / 2, this.x));
                this.targetX = Math.max(this.size / 2, Math.min(CONFIG.width - this.size / 2, this.targetX));
            }
            draw(ctx) {
                // بدن فضانورد (با کلاه)
                const cx = this.x, cy = this.y;
                // جت‌پک
                ctx.fillStyle = '#3a4a7a';
                ctx.shadowColor = 'rgba(100, 180, 255, 0.4)';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.ellipse(cx - 12, cy + 10, 8, 12, 0.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cx + 12, cy + 10, 8, 12, -0.2, 0, Math.PI * 2);
                ctx.fill();

                // بدن
                ctx.fillStyle = '#7a9eff';
                ctx.shadowBlur = 30;
                ctx.beginPath();
                ctx.arc(cx, cy, this.size / 2, 0, Math.PI * 2);
                ctx.fill();

                // کلاه شیشه‌ای
                ctx.fillStyle = 'rgba(180, 220, 255, 0.25)';
                ctx.strokeStyle = '#b0d0ff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(cx, cy - 4, this.size / 2.6, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // صورتک
                ctx.fillStyle = '#222';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(cx - 6, cy - 6, 3.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx + 6, cy - 6, 3.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx, cy + 2, 5, 0, Math.PI);
                ctx.stroke();

                // آنتن
                ctx.strokeStyle = '#ffd966';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ffd966';
                ctx.beginPath();
                ctx.moveTo(cx + 10, cy - 18);
                ctx.lineTo(cx + 20, cy - 34);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx + 20, cy - 36, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#ff4444';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // آیتم‌ها
        class FallingItem {
            constructor(type, x, size, speed) {
                this.type = type; // 'meteor', 'star', 'powerup'
                this.x = x || Math.random() * (CONFIG.width - 30) + 15;
                this.y = -20;
                this.size = size || CONFIG.meteorMinSize + Math.random() * 20;
                this.speed = speed || CONFIG.baseSpeed + Math.random() * 1.2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.04;
                // نوع پاورآپ
                this.powerType = ''; // 'shield', 'speed', 'bomb'
                if (type === 'powerup') {
                    const types = ['shield', 'speed', 'bomb'];
                    this.powerType = types[Math.floor(Math.random() * types.length)];
                    this.size = CONFIG.powerupSize;
                }
                if (type === 'star') {
                    this.size = CONFIG.starSize;
                    this.speed = CONFIG.baseSpeed + Math.random() * 0.7;
                }
            }
            update() {
                this.y += this.speed;
                this.rotation += this.rotSpeed;
            }
            isOffScreen() {
                return this.y > CONFIG.height + 30;
            }
            draw(ctx) {
                const cx = this.x, cy = this.y;
                if (this.type === 'meteor') {
                    // شهاب‌سنگ با جرقه
                    ctx.shadowColor = 'rgba(255, 120, 30, 0.6)';
                    ctx.shadowBlur = 30;
                    const grad = ctx.createRadialGradient(cx - 4, cy - 4, 2, cx, cy, this.size);
                    grad.addColorStop(0, '#ff7744');
                    grad.addColorStop(0.6, '#aa4422');
                    grad.addColorStop(1, '#441100');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, this.size / 2, this.size / 2.6, this.rotation, 0, Math.PI * 2);
                    ctx.fill();
                    // جرقه
                    ctx.shadowBlur = 50;
                    ctx.fillStyle = 'rgba(255, 200, 80, 0.3)';
                    ctx.beginPath();
                    ctx.arc(cx - 6, cy + 4, this.size / 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else if (this.type === 'star') {
                    // ستاره طلایی
                    ctx.shadowColor = '#ffd966';
                    ctx.shadowBlur = 40;
                    ctx.fillStyle = '#FFD966';
                    ctx.strokeStyle = '#FFA500';
                    ctx.lineWidth = 2;
                    // رسم ستاره ۵ پر با مسیر
                    const spikes = 5;
                    const outerR = this.size / 2;
                    const innerR = this.size / 4.5;
                    ctx.beginPath();
                    for (let i = 0; i < spikes * 2; i++) {
                        const r = i % 2 === 0 ? outerR : innerR;
                        const angle = (i * Math.PI) / spikes - Math.PI / 2 + this.rotation;
                        const px = cx + r * Math.cos(angle);
                        const py = cy + r * Math.sin(angle);
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                } else if (this.type === 'powerup') {
                    // پاورآپ با شکل خاص
                    ctx.shadowColor = '#44ddff';
                    ctx.shadowBlur = 45;
                    const colors = {
                        shield: '#44ddff',
                        speed: '#ffdd44',
                        bomb: '#ff5555'
                    };
                    ctx.fillStyle = colors[this.powerType] || '#44ddff';
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    if (this.powerType === 'shield') {
                        // شکل سپر
                        ctx.arc(cx, cy, this.size / 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                        ctx.fillStyle = '#fff';
                        ctx.font = '18px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.shadowBlur = 0;
                        ctx.fillText('🛡️', cx, cy + 1);
                    } else if (this.powerType === 'speed') {
                        ctx.beginPath();
                        ctx.arc(cx, cy, this.size / 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                        ctx.fillStyle = '#fff';
                        ctx.font = '18px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.shadowBlur = 0;
                        ctx.fillText('⚡', cx, cy + 1);
                    } else if (this.powerType === 'bomb') {
                        ctx.beginPath();
                        ctx.arc(cx, cy, this.size / 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                        ctx.fillStyle = '#fff';
                        ctx.font = '18px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.shadowBlur = 0;
                        ctx.fillText('💣', cx, cy + 1);
                    }
                    ctx.shadowBlur = 0;
                }
            }
        }

        // ---------- مدیریت بازی ----------
        class Game {
            constructor() {
                this.player = new Player();
                this.items = [];
                this.score = 0;
                this.best = parseInt(localStorage.getItem('fallingHeroBest')) || 0;
                this.gameOver = false;
                this.started = false;
                this.frameCount = 0;
                this.speedMultiplier = 1;
                this.activePowerup = null; // { type, timer }
                this.powerupTimer = 0;
                this.comboCount = 0;
                this.isInvincible = false;
                this.invincibleTimer = 0;
                this.particles = [];

                // کنترل ماوس/لمس
                this.isDragging = false;
                this.mouseX = this.player.x;

                this.setupControls();
                this.updateBestDisplay();
                this.showStartScreen();
            }

            setupControls() {
                const c = canvas;
                // ماوس
                c.addEventListener('mousemove', (e) => {
                    const rect = c.getBoundingClientRect();
                    const scaleX = c.width / rect.width;
                    const x = (e.clientX - rect.left) * scaleX;
                    this.mouseX = x;
                    if (this.started && !this.gameOver) {
                        this.player.targetX = x;
                    }
                });
                c.addEventListener('mouseleave', () => {
                    // اگر موس بیرون رفت، هدف رو همونجا نگه دار
                });
                // لمس
                c.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const rect = c.getBoundingClientRect();
                    const scaleX = c.width / rect.width;
                    const touch = e.touches[0];
                    const x = (touch.clientX - rect.left) * scaleX;
                    this.mouseX = x;
                    if (this.started && !this.gameOver) {
                        this.player.targetX = x;
                    }
                }, { passive: false });
                c.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const rect = c.getBoundingClientRect();
                    const scaleX = c.width / rect.width;
                    const touch = e.touches[0];
                    const x = (touch.clientX - rect.left) * scaleX;
                    this.mouseX = x;
                    if (this.started && !this.gameOver) {
                        this.player.targetX = x;
                    }
                }, { passive: false });
            }

            startGame() {
                this.started = true;
                this.gameOver = false;
                this.score = 0;
                this.items = [];
                this.particles = [];
                this.frameCount = 0;
                this.speedMultiplier = 1;
                this.activePowerup = null;
                this.powerupTimer = 0;
                this.isInvincible = false;
                this.invincibleTimer = 0;
                this.player = new Player();
                this.player.x = CONFIG.width / 2;
                this.player.targetX = CONFIG.width / 2;
                this.player.smoothX = CONFIG.width / 2;
                this.updateScoreDisplay();
                modalOverlay.classList.add('hidden');
                powerupIndicator.classList.remove('show');
                this.updateBestDisplay();
            }

            gameOverHandler() {
                this.gameOver = true;
                this.started = false;
                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('fallingHeroBest', String(this.best));
                    this.updateBestDisplay();
                    modalSub.textContent = '🎉 رکورد جدید! 🎉';
                } else {
                    modalSub.textContent = '💫 بازی تمام شد!';
                }
                modalScore.style.display = 'block';
                modalScore.textContent = `امتیاز: ${this.score}`;
                modalBest.textContent = `🏆 بهترین: ${this.best}`;
                mainBtn.innerHTML = `
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 3L19 12L5 21V3Z" fill="white" stroke="white" stroke-width="1.5"/>
                    </svg>
                    دوباره!
                `;
                resetBtn.style.display = 'none';
                modalOverlay.classList.remove('hidden');
            }

            showStartScreen() {
                modalSub.textContent = 'فضانورد، آماده‌ای؟';
                modalScore.style.display = 'none';
                modalBest.textContent = `🏆 بهترین: ${this.best}`;
                mainBtn.innerHTML = `
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 3L19 12L5 21V3Z" fill="white" stroke="white" stroke-width="1.5"/>
                    </svg>
                    شروع بازی
                `;
                resetBtn.style.display = 'none';
                modalOverlay.classList.remove('hidden');
            }

            updateBestDisplay() {
                bestDisplay.textContent = this.best;
            }

            updateScoreDisplay() {
                scoreDisplay.textContent = this.score;
            }

            // تولید آیتم
            spawnItem() {
                const r = Math.random();
                let type = 'meteor';
                if (r < CONFIG.starChance) type = 'star';
                else if (r < CONFIG.starChance + CONFIG.powerupChance) type = 'powerup';

                // افزایش سرعت با امتیاز
                const speedBonus = Math.min(this.score / 50, 1.2);
                const baseSpeed = CONFIG.baseSpeed + speedBonus * 0.8;

                let size;
                if (type === 'meteor') {
                    size = CONFIG.meteorMinSize + Math.random() * (CONFIG.meteorMaxSize - CONFIG.meteorMinSize);
                } else if (type === 'star') {
                    size = CONFIG.starSize;
                } else {
                    size = CONFIG.powerupSize;
                }
                const item = new FallingItem(type, null, size, baseSpeed + Math.random() * 1.0);
                // برای تنوع در موقعیت x
                item.x = Math.random() * (CONFIG.width - 30) + 15;
                return item;
            }

            // ذرات انفجار
            addExplosion(x, y, color, count = 18) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 4 + 1;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 1,
                        life: 1,
                        decay: 0.015 + Math.random() * 0.025,
                        size: Math.random() * 6 + 2,
                        color: color,
                    });
                }
            }

            // پاورآپ
            activatePowerup(type) {
                this.activePowerup = { type, timer: 150 }; // 150 فریم ≈ 2.5 ثانیه
                this.powerupTimer = 150;
                const icons = { shield: '🛡️', speed: '⚡', bomb: '💣' };
                const names = { shield: 'سپر', speed: 'سرعت', bomb: 'بمب' };
                powerupIcon.textContent = icons[type] || '✨';
                powerupText.textContent = names[type] || 'قدرت';
                powerupIndicator.classList.add('show');

                if (type === 'shield') {
                    this.isInvincible = true;
                    this.invincibleTimer = 150;
                } else if (type === 'bomb') {
                    // نابودی همه موانع
                    const toRemove = [];
                    for (const item of this.items) {
                        if (item.type === 'meteor') {
                            this.addExplosion(item.x, item.y, '#ff8833', 20);
                            toRemove.push(item);
                        }
                    }
                    this.items = this.items.filter(it => !toRemove.includes(it));
                    this.addExplosion(this.player.x, this.player.y, '#ffaa44', 30);
                } else if (type === 'speed') {
                    // سرعت جمع‌آوری ستاره دو برابر (با ضریب امتیاز)
                    // در برخورد ستاره اعمال می‌شود
                }
                // بعد از ۱۵۰ فریم غیرفعال می‌شود
            }

            updatePowerups() {
                if (this.activePowerup) {
                    this.powerupTimer--;
                    if (this.powerupTimer <= 0) {
                        this.activePowerup = null;
                        powerupIndicator.classList.remove('show');
                        this.isInvincible = false;
                    }
                }
                if (this.isInvincible) {
                    this.invincibleTimer--;
                    if (this.invincibleTimer <= 0) {
                        this.isInvincible = false;
                    }
                }
            }

            // حلقه اصلی
            update() {
                if (!this.started || this.gameOver) return;

                this.frameCount++;

                // اسپاون آیتم‌ها
                const spawnRate = Math.max(14, CONFIG.spawnInterval - Math.floor(this.score / 20));
                if (this.frameCount % spawnRate === 0) {
                    this.items.push(this.spawnItem());
                    // گاهی دو تا همزمان
                    if (this.score > 30 && Math.random() < 0.2) {
                        this.items.push(this.spawnItem());
                    }
                }

                // بروزرسانی آیتم‌ها
                for (const item of this.items) {
                    item.update();
                }
                // حذف آیتم‌های خارج
                this.items = this.items.filter(it => !it.isOffScreen());

                // بروزرسانی بازیکن
                this.player.update();

                // برخوردها
                const player = this.player;
                const toRemove = [];
                for (const item of this.items) {
                    const dx = player.x - item.x;
                    const dy = player.y - item.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const threshold = (player.size / 2) + (item.size / 2) - 4;

                    if (dist < threshold) {
                        if (item.type === 'meteor') {
                            if (this.isInvincible) {
                                // سپر فعال، شهاب نابود می‌شه
                                this.addExplosion(item.x, item.y, '#ff6633', 15);
                                toRemove.push(item);
                                continue;
                            } else {
                                // برخورد = Game Over
                                this.addExplosion(player.x, player.y, '#ff4444', 30);
                                this.gameOverHandler();
                                return;
                            }
                        } else if (item.type === 'star') {
                            // امتیاز
                            let points = 10;
                            if (this.activePowerup && this.activePowerup.type === 'speed') {
                                points = 20;
                            }
                            this.score += points;
                            this.updateScoreDisplay();
                            this.addExplosion(item.x, item.y, '#ffd966', 14);
                            toRemove.push(item);
                            // هر ۵۰ امتیاز یه پاورآپ رایگان
                            if (this.score % 50 === 0 && this.score > 0) {
                                const types = ['shield', 'speed', 'bomb'];
                                const randType = types[Math.floor(Math.random() * types.length)];
                                this.activatePowerup(randType);
                            }
                        } else if (item.type === 'powerup') {
                            this.activatePowerup(item.powerType);
                            this.addExplosion(item.x, item.y, '#44ddff', 20);
                            toRemove.push(item);
                        }
                    }
                }
                // حذف آیتم‌های جمع‌شده
                this.items = this.items.filter(it => !toRemove.includes(it));

                // بروزرسانی ذرات
                for (const p of this.particles) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.05;
                    p.life -= p.decay;
                }
                this.particles = this.particles.filter(p => p.life > 0);

                // پاورآپ‌ها
                this.updatePowerups();

                // افزایش سرعت با امتیاز
                this.speedMultiplier = 1 + Math.min(this.score / 120, 1.2);
                for (const item of this.items) {
                    if (item.type === 'meteor') {
                        item.speed = (CONFIG.baseSpeed + Math.random() * 0.8) * this.speedMultiplier;
                    }
                }
            }

            draw() {
                ctx.clearRect(0, 0, CONFIG.width, CONFIG.height);

                // کشیدن آیتم‌ها
                for (const item of this.items) {
                    item.draw(ctx);
                }

                // کشیدن ذرات
                for (const p of this.particles) {
                    ctx.globalAlpha = p.life;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = p.color || '#ffaa44';
                    ctx.fillStyle = p.color || '#ffaa44';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;

                // کشیدن بازیکن (با جلوه سپر)
                if (this.isInvincible) {
                    ctx.shadowColor = '#44ddff';
                    ctx.shadowBlur = 60;
                    ctx.strokeStyle = 'rgba(68, 221, 255, 0.5)';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(this.player.x, this.player.y, this.player.size / 2 + 10, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
                this.player.draw(ctx);

                // نمایش پاورآپ فعال روی بازیکن
                if (this.activePowerup) {
                    ctx.font = '24px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = '#44ddff';
                    ctx.fillText(powerupIcon.textContent, this.player.x, this.player.y - 40);
                    ctx.shadowBlur = 0;
                }
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        // ---------- راه‌اندازی ----------
        const game = new Game();

        // حلقه ستاره‌های پس‌زمینه
        function starsLoop() {
            starField.update();
            starsCtx.clearRect(0, 0, CONFIG.width, CONFIG.height);
            starField.draw(starsCtx);
            requestAnimationFrame(starsLoop);
        }
        starsLoop();

        // دکمه‌ها
        mainBtn.addEventListener('click', () => {
            game.startGame();
        });
        resetBtn.addEventListener('click', () => {
            game.startGame();
        });

        // شروع حلقه بازی
        game.loop();

        // ریسایز مجدد برای ستاره‌ها
        window.addEventListener('resize', () => {
            resizeCanvas();
            starField.init();
        });

        // کمک: با کلیک روی صفحه در حالت gameOver هم میشه شروع کرد
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                if (game.gameOver || !game.started) {
                    game.startGame();
                }
            }
        });

        console.log('🚀 Falling Hero - بازی سقوط آزاد راه‌اندازی شد!');
    })();
</script>
